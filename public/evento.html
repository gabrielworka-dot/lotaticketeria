<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lota Ticketeria — Ingresso</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#0F0E0C;color:#F0EDE8;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:60px;}
a{color:inherit;}
.topbar{width:100%;padding:14px 20px;display:flex;align-items:center;border-bottom:1px solid #2A2822;}
.logo{font-size:18px;font-weight:900;color:#E8961A;}
.wrap{width:100%;max-width:560px;padding:20px 16px 0;}
.hero{border-radius:16px;overflow:hidden;margin-bottom:16px;background:#1E1C18;border:1px solid #2A2822;}
.hero-img{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#C47B14,#7A4A0C);display:flex;align-items:center;justify-content:center;font-size:40px;}
.hero-img img{width:100%;height:100%;object-fit:cover;}
.hero-body{padding:20px;}
.hero-cat{font-size:11px;letter-spacing:2px;color:#E8961A;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.hero-nome{font-size:24px;font-weight:900;line-height:1.2;margin-bottom:12px;}
.hero-meta{font-size:13px;color:#A09880;display:flex;flex-direction:column;gap:6px;}
.hero-organizador{margin-top:14px;padding-top:14px;border-top:1px solid #2A2822;display:flex;align-items:center;gap:10px;font-size:13px;color:#A09880;}
.hero-desc{margin-top:14px;font-size:13px;color:#C8C2B8;line-height:1.7;white-space:pre-wrap;}
.card{background:#161410;border:1px solid #2A2822;border-radius:14px;padding:20px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:#A09880;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.lote{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #2A2822;gap:12px;}
.lote:last-child{border-bottom:none;}
.lote-info{flex:1;min-width:0;}
.lote-nome{font-size:14px;font-weight:700;}
.lote-preco{font-size:13px;color:#E8961A;margin-top:2px;font-weight:700;}
.lote-preco.gratis{color:#22C55E;}
.lote-disp{font-size:11px;color:#605848;margin-top:2px;}
.qtd-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qtd-btn{width:32px;height:32px;border-radius:8px;border:1px solid #2A2822;background:#1E1C18;color:#F0EDE8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qtd-val{font-size:15px;font-weight:700;min-width:20px;text-align:center;}
.fg{margin-bottom:13px;}
.fg label{font-size:11px;font-weight:600;color:#A09880;display:block;margin-bottom:5px;}
.fi{width:100%;background:#0F0E0C;border:1.5px solid #2A2822;border-radius:9px;padding:11px 13px;color:#F0EDE8;font-family:inherit;font-size:15px;outline:none;}
.fi:focus{border-color:#E8961A;}
.cupom-row{display:flex;gap:8px;}
.cupom-row .fi{flex:1;}
.cupom-aplicado{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:#4ADE80;display:flex;justify-content:space-between;align-items:center;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:#A09880;}
.total-row.final{padding-top:14px;border-top:1px solid #2A2822;margin-top:6px;}
.total-row.final .total-val{font-size:24px;font-weight:800;color:#E8961A;}
.btn{width:100%;padding:15px;background:#E8961A;border:none;border-radius:10px;color:#18160F;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;}
.btn:disabled{opacity:.4;}
.err{font-size:12px;color:#F87171;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;margin-bottom:12px;display:none;}
.empty{text-align:center;padding:40px 20px;color:#605848;}
.spinner{width:36px;height:36px;border:3px solid rgba(232,150,26,.2);border-top-color:#E8961A;border-radius:50%;animation:spin 1s linear infinite;margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.ticket{background:#1E1C18;border:1px solid #2A2822;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.ticket-qr{width:70px;height:70px;background:#fff;border-radius:8px;flex-shrink:0;}
.ticket-code{font-family:monospace;font-size:13px;font-weight:700;color:#E8961A;}
.ticket-lote{font-size:11px;color:#A09880;margin-top:3px;}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:16px;}
.badge.ok{background:rgba(34,197,94,.15);color:#4ADE80;}
.badge.pending{background:rgba(232,150,26,.15);color:#E8961A;}
.badge.fail{background:rgba(239,68,68,.15);color:#F87171;}
.promoter-badge{background:rgba(196,123,20,.12);border:1px solid rgba(196,123,20,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:#E8961A;margin-bottom:14px;text-align:center;}
.copyw{font-size:10px;color:#605848;text-align:center;margin-top:24px;opacity:.6;}
</style>
</head>
<body>
<div class="topbar"><a href="/" class="logo">🎟️ Lota Ticketeria</a></div>
<div class="wrap" id="app"><div class="spinner"></div></div>
<div class="copyw">🎟️ Vendido com Lota Ticketeria</div>

<script>
const params=new URLSearchParams(location.search);
const pedidoParam=params.get('pedido');
const statusParam=params.get('status');
const refParam=params.get('ref'); // código de promoter
const slug=location.pathname.split('/').filter(Boolean).pop();

let EVENTO=null, PROMOTER_INFO=null;
let selecoes={};
let cupomAplicado=null;
const AT_COMPRADOR=localStorage.getItem('role_token')||null;

async function api(m,p,b){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(AT_COMPRADOR) o.headers['Authorization']='Bearer '+AT_COMPRADOR;
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(p,o);
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'Erro');
  return d;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function injetarPixels(pixels){
  if(!pixels) return;
  if(pixels.metaPixelId){
    const s=document.createElement('script');
    s.textContent=`!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${pixels.metaPixelId}');fbq('track','ViewContent');`;
    document.head.appendChild(s);
  }
  if(pixels.gaMeasurementId){
    const s1=document.createElement('script'); s1.async=true; s1.src='https://www.googletagmanager.com/gtag/js?id='+pixels.gaMeasurementId;
    document.head.appendChild(s1);
    const s2=document.createElement('script');
    s2.textContent=`window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','${pixels.gaMeasurementId}');`;
    document.head.appendChild(s2);
  }
  if(pixels.tiktokPixelId){
    const s=document.createElement('script');
    s.textContent=`!function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};ttq.load('${pixels.tiktokPixelId}');ttq.page();}(window,document,'ttq');`;
    document.head.appendChild(s);
  }
}
function dispararConversao(pixels,valor){
  if(!pixels) return;
  if(pixels.metaPixelId && window.fbq) fbq('track','Purchase',{value:valor,currency:'BRL'});
  if(pixels.gaMeasurementId && window.gtag) gtag('event','purchase',{value:valor,currency:'BRL'});
  if(pixels.tiktokPixelId && window.ttq) ttq.track('CompletePayment',{value:valor,currency:'BRL'});
  if(pixels.googleAdsConversionId && window.gtag) gtag('event','conversion',{send_to:pixels.googleAdsConversionId+'/'+(pixels.googleAdsConversionLabel||''),value:valor,currency:'BRL'});
}

async function init(){
  if(pedidoParam){ renderStatusPedido(); return; }
  try{
    EVENTO=await api('GET','/api/public/eventos/'+slug);
    injetarPixels(EVENTO.pixels);
    if(refParam){ try{ PROMOTER_INFO=await api('GET','/api/public/eventos/'+slug+'/promoter/'+refParam); }catch(e){} }
    renderEvento();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">🎪</div><p>'+esc(e.message)+'</p></div>';
  }
}

function renderEvento(){
  const c1=(EVENTO.cores&&EVENTO.cores.primaria)||'#C47B14';
  const lotesFonte=PROMOTER_INFO?PROMOTER_INFO.lotes:EVENTO.lotes;
  const lotesHtml=lotesFonte.length?lotesFonte.map(l=>`
    <div class="lote">
      <div class="lote-info">
        <div class="lote-nome">${esc(l.nome)}</div>
        <div class="lote-preco ${l.cortesia?'gratis':''}">${l.cortesia?'Cortesia':'R$ '+l.preco.toFixed(2).replace('.',',')}</div>
        <div class="lote-disp">${l.disponivel} disponíveis</div>
      </div>
      <div class="qtd-ctrl">
        <button class="qtd-btn" onclick="alterarQtd('${l.id}',-1)">−</button>
        <span class="qtd-val" id="qtd-${l.id}">0</span>
        <button class="qtd-btn" onclick="alterarQtd('${l.id}',1,${l.disponivel})">+</button>
      </div>
    </div>`).join(''):'<div class="empty">Nenhum lote disponível.</div>';

  document.getElementById('app').innerHTML=`
    ${EVENTO.testMode?'<div style="background:#C47B14;color:#18160F;font-weight:700;font-size:12px;text-align:center;padding:8px;border-radius:8px;margin-bottom:12px">🧪 MODO TESTE — nenhuma cobrança real será feita</div>':''}
    ${PROMOTER_INFO?'<div class="promoter-badge">🎟️ Você está comprando pelo link de <strong>'+esc(PROMOTER_INFO.promoterNome)+'</strong></div>':''}
    <div class="hero">
      <div class="hero-img">${EVENTO.imagemCapa?'<img src="'+esc(EVENTO.imagemCapa)+'">':'🎪'}</div>
      <div class="hero-body">
        <div class="hero-cat">${esc(EVENTO.categoria||'')}</div>
        <div class="hero-nome">${esc(EVENTO.nome)}</div>
        <div class="hero-meta">
          <span>📅 ${new Date(EVENTO.dataEvento).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}${EVENTO.horaEvento?' às '+EVENTO.horaEvento:''}</span>
          ${EVENTO.local?'<span>📍 '+esc(EVENTO.local)+(EVENTO.cidade?', '+esc(EVENTO.cidade):'')+'</span>':''}
        </div>
        ${EVENTO.organizador?.nome?'<div class="hero-organizador"><span>Por <a href="/o/'+esc(EVENTO.organizador.slug)+'" style="color:#E8961A;font-weight:700">'+esc(EVENTO.organizador.nome)+'</a></span></div>':''}
        ${EVENTO.descricao?'<div class="hero-desc">'+esc(EVENTO.descricao)+'</div>':''}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Escolha seus ingressos</div>
      ${lotesHtml}
      <div style="margin-top:14px">
        <label style="font-size:11px;font-weight:600;color:#A09880;display:block;margin-bottom:5px">Cupom de desconto</label>
        <div id="cupomArea">
          <div class="cupom-row">
            <input class="fi" id="cupomInput" placeholder="Tenho um cupom">
            <button class="btn" style="width:auto;margin:0;padding:11px 18px;font-size:13px" onclick="aplicarCupom()">Aplicar</button>
          </div>
        </div>
      </div>
      <div class="total-row"><span>Subtotal</span><span id="subtotalVal">R$ 0,00</span></div>
      <div class="total-row" id="descontoRow" style="display:none"><span>Desconto</span><span id="descontoVal" style="color:#4ADE80">- R$ 0,00</span></div>
      <div class="total-row final"><span>Total</span><span class="total-val" id="totalVal">R$ 0,00</span></div>
    </div>
    <div class="card" id="dadosCard" style="display:none">
      <div class="card-title">Seus dados</div>
      <div class="err" id="errMsg"></div>
      <div class="fg"><label>Nome completo *</label><input class="fi" id="cNome" placeholder="Seu nome"></div>
      <div class="fg"><label>E-mail *</label><input class="fi" type="email" id="cEmail" placeholder="seu@email.com"></div>
      <div class="fg"><label>WhatsApp</label><input class="fi" id="cTel" placeholder="(11) 99999-9999"></div>
      <button class="btn" id="btnComprar" onclick="finalizarCompra()">Ir para pagamento →</button>
    </div>
  `;
}

function alterarQtd(loteId,delta,max){
  const atual=selecoes[loteId]||0;
  let novo=atual+delta;
  if(novo<0) novo=0;
  if(max!==undefined && novo>max) novo=max;
  selecoes[loteId]=novo;
  document.getElementById('qtd-'+loteId).textContent=novo;
  atualizarTotal();
}

function getLotesFonte(){ return PROMOTER_INFO?PROMOTER_INFO.lotes:EVENTO.lotes; }

function atualizarTotal(){
  let subtotal=0, temItem=false;
  const lotes=getLotesFonte();
  for(const loteId in selecoes){
    const qtd=selecoes[loteId];
    if(qtd>0){ temItem=true; const lote=lotes.find(l=>l.id===loteId); if(lote) subtotal+=lote.preco*qtd; }
  }
  let desconto=0;
  if(cupomAplicado){
    desconto=cupomAplicado.tipo==='fixo'?cupomAplicado.valor:Math.round(subtotal*(cupomAplicado.valor/100)*100)/100;
    desconto=Math.min(desconto,subtotal);
  }
  const total=Math.max(0,subtotal-desconto);
  document.getElementById('subtotalVal').textContent='R$ '+subtotal.toFixed(2).replace('.',',');
  document.getElementById('totalVal').textContent='R$ '+total.toFixed(2).replace('.',',');
  const dRow=document.getElementById('descontoRow');
  if(desconto>0){ dRow.style.display='flex'; document.getElementById('descontoVal').textContent='- R$ '+desconto.toFixed(2).replace('.',','); }
  else dRow.style.display='none';
  document.getElementById('dadosCard').style.display=temItem?'block':'none';
}

async function aplicarCupom(){
  const codigo=document.getElementById('cupomInput')?.value?.trim();
  if(!codigo) return;
  // Validação real acontece no checkout; aqui só guardamos localmente pra exibir prévia
  cupomAplicado={codigo, tipo:'percentual', valor:0, _pendente:true};
  const area=document.getElementById('cupomArea');
  area.innerHTML='<div class="cupom-aplicado">🎟️ Cupom "'+esc(codigo)+'" será aplicado no pagamento <button onclick="removerCupom()" style="background:none;border:none;color:#4ADE80;cursor:pointer;font-weight:700">✕</button></div>';
  atualizarTotal();
}
function removerCupom(){
  cupomAplicado=null;
  document.getElementById('cupomArea').innerHTML='<div class="cupom-row"><input class="fi" id="cupomInput" placeholder="Tenho um cupom"><button class="btn" style="width:auto;margin:0;padding:11px 18px;font-size:13px" onclick="aplicarCupom()">Aplicar</button></div>';
  atualizarTotal();
}

async function finalizarCompra(){
  const nome=document.getElementById('cNome').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const tel=document.getElementById('cTel').value.trim();
  const errEl=document.getElementById('errMsg');
  errEl.style.display='none';
  if(!nome||!email){errEl.textContent='Preencha nome e e-mail.';errEl.style.display='block';return;}
  const itens=Object.entries(selecoes).filter(([_,q])=>q>0).map(([loteId,qtd])=>({loteId,qtd}));
  if(!itens.length){errEl.textContent='Selecione ao menos um ingresso.';errEl.style.display='block';return;}

  const btn=document.getElementById('btnComprar');
  btn.disabled=true; btn.textContent='Processando...';
  try{
    const body={slug,itens,comprador:{nome,email,telefone:tel}};
    if(cupomAplicado) body.cupom=cupomAplicado.codigo;
    if(refParam) body.ref=refParam;
    const d=await api('POST','/api/public/checkout',body);
    if(d.cortesia){
      location.href='/e/'+slug+'?pedido='+d.pedidoId+'&status=success';
      return;
    }
    location.href=d.init_point;
  }catch(e){
    errEl.textContent=e.message; errEl.style.display='block';
    btn.disabled=false; btn.textContent='Ir para pagamento →';
  }
}

async function renderStatusPedido(){
  const badge={success:['ok','✅ Pagamento aprovado!'],pending:['pending','⏳ Pagamento em processamento'],failure:['fail','❌ Pagamento não aprovado']};
  const [cls,label]=badge[statusParam]||['pending','⏳ Verificando...'];
  document.getElementById('app').innerHTML=`<div class="card" style="text-align:center"><div class="badge ${cls}">${label}</div><div id="pedidoContent"><div class="spinner"></div></div></div>`;
  let tentativas=0;
  const poll=async()=>{
    try{
      const d=await api('GET','/api/public/pedido/'+pedidoParam);
      if(d.status==='pago' && d.tickets.length){
        document.getElementById('pedidoContent').innerHTML=`
          <p style="font-size:13px;color:#A09880;margin-bottom:16px">Seus ingressos, ${esc(d.comprador.nome)}:</p>
          ${d.tickets.map(t=>`<div class="ticket"><div class="ticket-qr" id="qr-${t.codigo}"></div><div><div class="ticket-code">${t.codigo}</div><div class="ticket-lote">${esc(t.loteNome)}</div></div></div>`).join('')}
          <p style="font-size:11px;color:#605848;margin-top:10px">Guarde estes códigos. Apresente-os na entrada.</p>`;
        d.tickets.forEach(t=>gerarQR(t.codigo));
        try{ const ev=await api('GET','/api/public/eventos/'+slug); dispararConversao(ev.pixels,d.total); }catch(e){}
        return;
      }
      if(d.status==='recusado'){ document.getElementById('pedidoContent').innerHTML='<p style="font-size:13px;color:#A09880">Pagamento não aprovado. Tente novamente.</p>'; return; }
      tentativas++;
      if(tentativas<10) setTimeout(poll,3000);
      else document.getElementById('pedidoContent').innerHTML='<p style="font-size:13px;color:#A09880">Ainda processando. Atualize a página em instantes.</p>';
    }catch(e){ document.getElementById('pedidoContent').innerHTML='<p style="font-size:13px;color:#A09880">'+esc(e.message)+'</p>'; }
  };
  poll();
}
function gerarQR(texto){
  const el=document.getElementById('qr-'+texto);
  if(!el) return;
  const img=document.createElement('img');
  img.src='https://api.qrserver.com/v1/create-qr-code/?size=140x140&data='+encodeURIComponent(texto);
  img.style.width='100%'; img.style.height='100%'; img.style.borderRadius='8px';
  el.appendChild(img);
}

init();
</script>
</body>
</html>
