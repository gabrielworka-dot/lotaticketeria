<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
:root{
  --bg:#0F0E0C;--card:#161410;--bg3:#1E1C18;--border:#2A2822;
  --text:#F0EDE8;--text2:#A09880;--text3:#605848;--text-soft:#C8C2B8;
  --p:#C47B14;--p2:#E8961A;--p-dark:#7A4A0C;
  --green:#4ADE80;--green2:#22C55E;--red:#F87171;--red2:#EF4444;
  --bg-deep:#18160F;--blue:#3B9EFF;--gray-occ:#3A3630;
}
html[data-theme="light"]{
  --bg:#EDE7DC;--card:#FFFFFF;--bg3:#F3EEE4;--border:#DBD0BB;
  --text:#221D15;--text2:#5C5344;--text3:#8C8271;--text-soft:#3A342A;
  --p:#B36A0E;--p2:#C47B14;--p-dark:#8A5410;
  --green:#16A34A;--green2:#15803D;--red:#DC2626;--red2:#B91C1C;
  --bg-deep:#18160F;--blue:#2563EB;--gray-occ:#D8CFB9;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden;width:100%;}
body{display:flex;flex-direction:column;align-items:center;padding-bottom:60px;}
a{color:inherit;}
.topbar{width:100%;padding:14px 20px;display:flex;align-items:center;border-bottom:1px solid var(--border);}
.logo{font-size:18px;font-weight:900;color:var(--p2);}
.wrap{width:100%;max-width:560px;padding:20px 16px 0;}
.hero{border-radius:16px;overflow:hidden;margin-bottom:16px;background:var(--bg3);border:1px solid var(--border);}
.hero-img{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--p),var(--p-dark));display:flex;align-items:center;justify-content:center;font-size:40px;}
.hero-img img{width:100%;height:100%;object-fit:cover;}
.hero-body{padding:20px;}
.hero-cat{font-size:11px;letter-spacing:2px;color:var(--p2);font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.hero-nome{font-size:24px;font-weight:900;line-height:1.2;margin-bottom:12px;}
.hero-meta{font-size:13px;color:var(--text2);display:flex;flex-direction:column;gap:6px;}
.hero-organizador{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);}
.hero-desc{margin-top:14px;font-size:13px;color:var(--text-soft);line-height:1.7;white-space:pre-wrap;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.lote{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;}
.lote:last-child{border-bottom:none;}
.lote-info{flex:1;min-width:0;}
.lote-nome{font-size:14px;font-weight:700;}
.lote-preco{font-size:13px;color:var(--p2);margin-top:2px;font-weight:700;}
.lote-preco.gratis{color:var(--green2);}
.lote-disp{font-size:11px;color:var(--text3);margin-top:2px;}
.qtd-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qtd-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qtd-val{font-size:15px;font-weight:700;min-width:20px;text-align:center;}
.fg{margin-bottom:13px;}
.fg label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-family:inherit;font-size:16px;outline:none;}
.fi-mp{width:100%;background:#FFFFFF;border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;height:44px;box-sizing:border-box;}
.fi-mp.focused{border-color:var(--p2);}
.fi-mp.invalid{border-color:var(--red2);}
.metodo-tabs{display:flex;gap:8px;margin-bottom:16px;}
.metodo-tab{flex:1;text-align:center;padding:11px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);}
.metodo-tab.active{background:rgba(232,150,26,.12);border-color:rgba(232,150,26,.4);color:var(--p2);}
.pix-box{text-align:center;}
.pix-box img{width:220px;height:220px;background:#fff;border-radius:10px;padding:8px;margin:0 auto 14px;display:block;}
.fi:focus{border-color:var(--p2);}
.cupom-row{display:flex;gap:8px;}
.cupom-row .fi{flex:1;}
.cupom-aplicado{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--green);display:flex;justify-content:space-between;align-items:center;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:var(--text2);}
.total-row.final{padding-top:14px;border-top:1px solid var(--border);margin-top:6px;}
.total-row.final .total-val{font-size:24px;font-weight:800;color:var(--p2);}
.btn{width:100%;padding:15px;background:var(--p2);border:none;border-radius:10px;color:var(--bg-deep);font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;}
.btn:disabled{opacity:.4;}
.err{font-size:12px;color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;margin-bottom:12px;display:none;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid rgba(232,150,26,.2);border-top-color:var(--p2);border-radius:50%;animation:spin 1s linear infinite;margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.ticket{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.ticket-qr{width:70px;height:70px;background:#fff;border-radius:8px;flex-shrink:0;}
.ticket-code{font-family:monospace;font-size:13px;font-weight:700;color:var(--p2);}
.ticket-lote{font-size:11px;color:var(--text2);margin-top:3px;}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:16px;}
.badge.ok{background:rgba(34,197,94,.15);color:var(--green);}
.badge.pending{background:rgba(232,150,26,.15);color:var(--p2);}
.badge.fail{background:rgba(239,68,68,.15);color:var(--red);}
.promoter-badge{background:rgba(196,123,20,.12);border:1px solid rgba(196,123,20,.3);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--p2);margin-bottom:14px;text-align:center;}
.copyw{font-size:10px;color:var(--text3);text-align:center;margin-top:24px;opacity:.6;}
</style>
</head>
<body>

<footer style="margin-top:30px;padding:24px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);text-align:center;width:100%;max-width:520px">
  <div style="display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-bottom:16px;text-align:left">
    <div>
      <div style="font-weight:700;color:var(--text2);margin-bottom:8px;font-size:11px;letter-spacing:1px">SAC</div>
      <div style="margin-bottom:4px">WhatsApp: <a href="https://wa.me/5521998579651" style="color:var(--p2);text-decoration:none">+55 21 99857-9651</a></div>

      <div>Instagram: <a href="https://instagram.com/lota_evento" target="_blank" style="color:var(--p2);text-decoration:none">@lota_evento</a></div>

      <div style="font-weight:700;color:var(--text2);margin-bottom:8px;font-size:11px;letter-spacing:1px">INFORMAÇÕES</div>
      <div style="margin-bottom:4px"><a href="/sobre-nos.html" style="color:var(--text3);text-decoration:none">Sobre nós</a></div>
      <div style="margin-bottom:4px"><a href="/privacidade.html" style="color:var(--text3);text-decoration:none">Política de Privacidade</a></div>

  <div>🎟️ Vendido com Lota Ticketeria</div>
</footer>

<script>
// ─── TEMA CLARO/ESCURO ───────────────────────────────────────
function aplicarTema(tema){
  document.documentElement.setAttribute('data-theme', tema);
  const btn=document.getElementById('themeToggle');
  if(btn) btn.textContent = tema==='light' ? '☀️' : '🌙';
}
(function(){ aplicarTema(localStorage.getItem('lota_tema') || 'dark'); })();
function alternarTema(){
  const atual = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const novo = atual === 'light' ? 'dark' : 'light';
  localStorage.setItem('lota_tema', novo);
  aplicarTema(novo);
}

const params=new URLSearchParams(location.search);
const pedidoParam=params.get('pedido');
const statusParam=params.get('status');
const refParam=params.get('ref'); // código de promoter
const slug=location.pathname.split('/').filter(Boolean).pop();

let EVENTO=null, PROMOTER_INFO=null;
let selecoes={};
let cupomAplicado=null;
const AT_COMPRADOR=localStorage.getItem('role_token')||null;

async function api(m,p,b){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(AT_COMPRADOR) o.headers['Authorization']='Bearer '+AT_COMPRADOR;
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(p,o);
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'Erro');
  return d;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseDataLocal(dataStr){ if(!dataStr) return new Date(); const [y,m,d]=String(dataStr).split('-').map(Number); return new Date(y,(m||1)-1,d||1); }

function injetarPixels(pixels){
  if(!pixels) return;
  if(pixels.metaPixelId){
    const s=document.createElement('script');
    s.textContent=`!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${pixels.metaPixelId}');fbq('track','PageView');fbq('track','ViewContent',{content_name:${JSON.stringify(EVENTO?.nome||'Evento')},content_type:'product',currency:'BRL'});`;
    document.head.appendChild(s);
  }
  if(pixels.gaMeasurementId){
    const s1=document.createElement('script'); s1.async=true; s1.src='https://www.googletagmanager.com/gtag/js?id='+pixels.gaMeasurementId;
    document.head.appendChild(s1);
    const s2=document.createElement('script');
    s2.textContent=`window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','${pixels.gaMeasurementId}');`;
    document.head.appendChild(s2);
  }
  if(pixels.tiktokPixelId){
    const s=document.createElement('script');
    s.textContent=`!function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};ttq.load('${pixels.tiktokPixelId}');ttq.page();}(window,document,'ttq');`;
    document.head.appendChild(s);
  }
}
let CHECKOUT_INICIADO_DISPARADO=false;
function dispararInicioCheckout(pixels,valor){
  if(!pixels || CHECKOUT_INICIADO_DISPARADO) return;
  CHECKOUT_INICIADO_DISPARADO=true;
  if(pixels.metaPixelId && window.fbq) fbq('track','InitiateCheckout',{value:valor,currency:'BRL'});
  if(pixels.tiktokPixelId && window.ttq) ttq.track('InitiateCheckout',{value:valor,currency:'BRL'});
}
function dispararConversao(pixels,valor,pedidoId){
  if(!pixels) return;
  // Proteção contra disparo duplicado: se a pessoa atualizar ou revisitar a página de
  // confirmação, o evento de Purchase não deve ser contado de novo.
  const chaveDedup='pixel_purchase_'+pedidoId;
  if(pedidoId && localStorage.getItem(chaveDedup)) return;
  if(pixels.metaPixelId && window.fbq) fbq('track','Purchase',{value:valor,currency:'BRL'});
  if(pixels.gaMeasurementId && window.gtag) gtag('event','purchase',{value:valor,currency:'BRL'});
  if(pixels.tiktokPixelId && window.ttq) ttq.track('CompletePayment',{value:valor,currency:'BRL'});
  if(pixels.googleAdsConversionId && window.gtag) gtag('event','conversion',{send_to:pixels.googleAdsConversionId+'/'+(pixels.googleAdsConversionLabel||''),value:valor,currency:'BRL'});
  if(pedidoId) localStorage.setItem(chaveDedup,'1');
}

async function init(){
  if(pedidoParam){ renderStatusPedido(); return; }
  try{
    EVENTO=await api('GET','/api/public/eventos/'+slug);
    injetarPixels(EVENTO.pixels);
    if(refParam){ try{ PROMOTER_INFO=await api('GET','/api/public/eventos/'+slug+'/promoter/'+refParam); }catch(e){} }
    renderEvento();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">🎪</div><p>'+esc(e.message)+'</p></div>';
  }
}

function renderEvento(){
  const c1=(EVENTO.cores&&EVENTO.cores.primaria)||'var(--p)';
  const temMapaAssentos=!!(EVENTO.mapaAssentos&&EVENTO.mapaAssentos.ativo&&EVENTO.mapaAssentos.setores?.length);
  const loteIdsComAssento=temMapaAssentos?new Set(EVENTO.mapaAssentos.setores.map(s=>s.loteId)):new Set();
  const lotesFonte=PROMOTER_INFO?PROMOTER_INFO.lotes:EVENTO.lotes;
  const lotesSemAssento=lotesFonte.filter(l=>!loteIdsComAssento.has(l.id));
  const lotesHtml=lotesSemAssento.length?lotesSemAssento.map(l=>`
    <div class="lote">
      <div class="lote-info">
        <div class="lote-nome">${esc(l.nome)}</div>
        <div class="lote-preco ${l.cortesia?'gratis':''}">${l.cortesia?'Cortesia':'R$ '+l.preco.toFixed(2).replace('.',',')}</div>
        ${!l.cortesia?'<div style="font-size:10px;color:var(--text3);margin-top:1px">Pague em até 12x</div>':''}
      </div>
      <div class="qtd-ctrl">
        <button class="qtd-btn" onclick="alterarQtd('${l.id}',-1)">−</button>
        <span class="qtd-val" id="qtd-${l.id}">0</span>
        <button class="qtd-btn" onclick="alterarQtd('${l.id}',1,${l.disponivel})">+</button>
      </div>
    </div>`).join(''):(temMapaAssentos?'':'<div class="empty">Nenhum lote disponível.</div>');

  document.getElementById('app').innerHTML=`
    ${EVENTO.testMode?'<div style="background:var(--p);color:var(--bg-deep);font-weight:700;font-size:12px;text-align:center;padding:8px;border-radius:8px;margin-bottom:12px">🧪 MODO TESTE — nenhuma cobrança real será feita</div>':''}
    ${PROMOTER_INFO?'<div class="promoter-badge">🎟️ Você está comprando pelo link de <strong>'+esc(PROMOTER_INFO.promoterNome)+'</strong></div>':''}
    <div class="hero">
      <div class="hero-img">${EVENTO.imagemCapa?'<img src="'+esc(EVENTO.imagemCapa)+'">':'🎪'}</div>
      <div class="hero-body">
        <div class="hero-cat">${esc(EVENTO.categoria||'')}</div>
        <div class="hero-nome">${esc(EVENTO.nome)}</div>
        <div class="hero-meta">
          <span>📅 ${parseDataLocal(EVENTO.dataEvento).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}${EVENTO.horaEvento?' às '+EVENTO.horaEvento:''}</span>
          ${EVENTO.local?'<span>📍 '+esc(EVENTO.local)+(EVENTO.cidade?', '+esc(EVENTO.cidade):'')+'</span>':''}
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">Pague em até 12x</div>
        ${EVENTO.organizador?.nome?'<div class="hero-organizador"><span>Por <a href="/o/'+esc(EVENTO.organizador.slug)+'" style="color:var(--p2);font-weight:700">'+esc(EVENTO.organizador.nome)+'</a>'+(EVENTO.organizador.verificado?' <span title="Produtor verificado" style="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;background:var(--blue);border-radius:50%;font-size:9px;vertical-align:middle;color:#fff">✓</span>':'')+'</span></div>':''}
        ${EVENTO.descricao?'<div class="hero-desc">'+esc(EVENTO.descricao)+'</div>':''}
        ${EVENTO.videoYoutubeId?'<div style="margin-top:16px;border-radius:10px;overflow:hidden;aspect-ratio:16/9"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/'+EVENTO.videoYoutubeId+'" title="Vídeo do evento" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;display:block"></iframe></div>':''}
      </div>
    </div>
    ${temMapaAssentos?renderMapaAssentosHtml():''}
    <div class="card">
      <div class="card-title">${temMapaAssentos&&lotesSemAssento.length?'Outros ingressos':'Escolha seus ingressos'}</div>
      ${lotesHtml}
      <div style="margin-top:14px">
        <label style="font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px">Cupom de desconto</label>
        <div id="cupomArea">
          <div class="cupom-row">
            <input class="fi" id="cupomInput" placeholder="Tenho um cupom">
            <button class="btn" style="width:auto;margin:0;padding:11px 18px;font-size:13px" onclick="aplicarCupom()">Aplicar</button>
          </div>
        </div>
      </div>
      <div class="total-row"><span>Subtotal</span><span id="subtotalVal">R$ 0,00</span></div>
      <div class="total-row" id="descontoRow" style="display:none"><span>Desconto</span><span id="descontoVal" style="color:var(--green)">- R$ 0,00</span></div>
      <div class="total-row" id="taxaRow" style="display:none"><span>Taxa administrativa</span><span id="taxaVal">R$ 0,00</span></div>
      <div class="total-row" id="creditoRow" style="display:none;align-items:center">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="usarCreditoCheck" onchange="atualizarTotal()"> Usar meu crédito (R$ <span id="creditoDisponivelTxt">0,00</span>)</label>
        <span id="creditoDescontoVal" style="color:var(--green)">- R$ 0,00</span>
      </div>
      <div class="total-row final"><span>Total</span><span class="total-val" id="totalVal">R$ 0,00</span></div>
    </div>
    <div class="card" id="dadosCard" style="display:none">
      <div class="card-title">Seus dados</div>
      <div class="err" id="errMsg"></div>
      <div class="fg"><label>Nome completo *</label><input class="fi" id="cNome" placeholder="Seu nome"></div>
      <div class="fg"><label>E-mail *</label><input class="fi" type="email" id="cEmail" placeholder="seu@email.com"></div>
      <div class="fg"><label>CPF *</label><input class="fi" id="cCpf" placeholder="Somente números" maxlength="14" oninput="const h=document.getElementById('form-checkout__identificationNumber'); if(h) h.value=this.value.replace(/[^\d]/g,'');"></div>
      <div class="fg"><label>WhatsApp</label><input class="fi" id="cTel" placeholder="(11) 99999-9999"></div>
    </div>

    <div class="card" id="pagamentoCard" style="display:none">
      <div class="card-title">Forma de pagamento</div>
      <div id="avisoValorDesatualizado" style="display:none;background:var(--pbg);border:1px solid var(--pb);color:var(--p2);padding:10px 12px;border-radius:9px;font-size:12px;margin-bottom:12px">

      </div>

      <div class="err" id="errMsgAsaas" style="display:none"></div>
      <button class="btn" id="btnComprarAsaas" onclick="processarSubmitAsaas()">Continuar para pagamento →</button>
    </div>

      <div class="card-title">Pague com PIX pra confirmar</div>

    </div>
  `;
  // O formulário só existe no DOM a partir daqui (foi criado agora, via innerHTML acima) —
  // por isso o listener é anexado aqui, e não em DOMContentLoaded (que já teria passado).
  const form=document.getElementById('form-checkout');
  if(form && !form.dataset.listenerAnexado){
    form.addEventListener('submit', event => {
      // No modo PIX, tratamos o envio diretamente aqui (não precisa de tokenização de cartão).
      // No modo Cartão, NÃO interceptamos — deixamos o próprio SDK do Mercado Pago capturar esse
      // envio (ele já está "escutando" o mesmo formulário) pra gerar o token corretamente e então
      // chamar processarSubmitCartao() através do callback onSubmit configurado no cardForm.
      if(METODO_ATUAL==='pix'){
        event.preventDefault();
        processarSubmitPix();
      }else if(!CARD_FORM_PRONTO){
        // Segurança: se o SDK do cartão ainda não terminou de carregar de verdade, evita que o
        // navegador tente navegar pra outra página (comportamento padrão de envio de formulário).
        event.preventDefault();
        const errEl=document.getElementById('errMsg');
        if(errEl){ errEl.textContent='Formulário de cartão ainda carregando, aguarde alguns segundos e tente novamente.'; errEl.style.display='block'; }
      }
    });
    form.dataset.listenerAnexado='1';
  }
}

function alterarQtd(loteId,delta,max){
  const atual=selecoes[loteId]||0;
  let novo=atual+delta;
  if(novo<0) novo=0;
  if(max!==undefined && novo>max) novo=max;
  selecoes[loteId]=novo;
  document.getElementById('qtd-'+loteId).textContent=novo;
  atualizarTotal();
}

let TOTAL_ATUAL=0, SALDO_CREDITO=0;
async function carregarSaldoCredito(){

    SALDO_CREDITO=d.saldoCredito||0;

  }catch(e){}

carregarSaldoCredito();

function atualizarTotal(){
  let subtotal=0, temItem=false;
  const lotes=getLotesFonte();
  for(const loteId in selecoes){
    const qtd=selecoes[loteId];
    if(qtd>0){ temItem=true; const lote=lotes.find(l=>l.id===loteId); if(lote) subtotal+=lote.preco*qtd; }
  }
  Object.values(assentosSelecionados).forEach(a=>{ subtotal+=a.preco; temItem=true; });
  let desconto=0;
  if(cupomAplicado){
    desconto=cupomAplicado.tipo==='fixo'?cupomAplicado.valor:Math.round(subtotal*(cupomAplicado.valor/100)*100)/100;
    desconto=Math.min(desconto,subtotal);
  }
  const valorIngressos=Math.max(0,subtotal-desconto);
  const feePercent=EVENTO?.feePercent||10;
  const taxa=valorIngressos>0?Math.round(valorIngressos*(feePercent/100)*100)/100:0;
  const usarCredito=document.getElementById('usarCreditoCheck')?.checked;
  const creditoAplicado=(usarCredito && SALDO_CREDITO>0)?Math.min(SALDO_CREDITO,taxa):0;
  const total=Math.round((valorIngressos+taxa-creditoAplicado)*100)/100;
  TOTAL_ATUAL=total;
  document.getElementById('subtotalVal').textContent='R$ '+subtotal.toFixed(2).replace('.',',');
  document.getElementById('totalVal').textContent='R$ '+total.toFixed(2).replace('.',',');
  const dRow=document.getElementById('descontoRow');
  if(desconto>0){ dRow.style.display='flex'; document.getElementById('descontoVal').textContent='- R$ '+desconto.toFixed(2).replace('.',','); }
  else dRow.style.display='none';
  const tRow=document.getElementById('taxaRow');
  if(taxa>0){ tRow.style.display='flex'; document.getElementById('taxaVal').textContent='R$ '+taxa.toFixed(2).replace('.',','); }
  else tRow.style.display='none';
  const cRow=document.getElementById('creditoRow');
  if(SALDO_CREDITO>0 && taxa>0){
    cRow.style.display='flex';
    document.getElementById('creditoDescontoVal').style.display=creditoAplicado>0?'inline':'none';
    document.getElementById('creditoDescontoVal').textContent='- R$ '+creditoAplicado.toFixed(2).replace('.',',');
  } else cRow.style.display='none';
  document.getElementById('dadosCard').style.display=temItem?'block':'none';
  const usaAsaas=EVENTO?.provedorPagamento==='asaas';
  document.getElementById('pagamentoCard').style.display=(temItem&&!usaAsaas)?'block':'none';
  document.getElementById('pagamentoCardAsaas').style.display=(temItem&&usaAsaas)?'block':'none';
  if(temItem){
    if(usaAsaas){ dispararInicioCheckout(EVENTO?.pixels,total); }
    else{
      // A montagem inicial é segura de chamar sempre — ela mesma verifica se já está montada e não
      // faz nada nesse caso (não há risco de travar campos que a pessoa já esteja preenchendo).
      // O que NUNCA fazemos é REMONTAR automaticamente depois disso — isso é que travava os campos.
      montarCardFormSeNecessario();
      avaliarAvisoValorDesatualizado();
      dispararInicioCheckout(EVENTO?.pixels,total);
    }
  }
}

let MP_INSTANCE=null, CARD_FORM=null, CARD_FORM_MONTADO=false, CARD_FORM_PRONTO=false, METODO_ATUAL='cartao', CARD_FORM_VALOR_MONTADO=0;

let PROCESSANDO_PAGAMENTO_ASAAS=false;
async function processarSubmitAsaas(){
  if(PROCESSANDO_PAGAMENTO_ASAAS) return;
  const nome=document.getElementById('cNome').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const cpf=document.getElementById('cCpf').value.trim().replace(/[^\d]/g,'');
  const tel=document.getElementById('cTel').value.trim();
  const errEl=document.getElementById('errMsgAsaas');
  errEl.style.display='none';
  if(!nome||!email){errEl.textContent='Preencha nome e e-mail.';errEl.style.display='block';return;}
  if(!cpf||cpf.length!==11){errEl.textContent='Digite um CPF válido (11 dígitos).';errEl.style.display='block';return;}
  const itens=Object.entries(selecoes).filter(([_,q])=>q>0).map(([loteId,qtd])=>({loteId,qtd}));
  Object.entries(assentosSelecionados).forEach(([seatCode,info])=>{ itens.push({loteId:info.loteId,qtd:1,assento:seatCode}); });
  if(!itens.length){errEl.textContent='Selecione ao menos um ingresso.';errEl.style.display='block';return;}

  PROCESSANDO_PAGAMENTO_ASAAS=true;
  const btn=document.getElementById('btnComprarAsaas');
  btn.disabled=true; btn.textContent='Processando...';

  const bodyBase={slug,itens,comprador:{nome,email,telefone:tel},cpf,metodo:METODO_ATUAL_ASAAS};
  if(cupomAplicado) bodyBase.cupom=cupomAplicado.codigo;
  if(refParam) bodyBase.ref=refParam;
  if(document.getElementById('usarCreditoCheck')?.checked) bodyBase.usarCredito=true;

  try{
    if(TOTAL_ATUAL<=0){
      const d=await api('POST','/api/public/checkout',{...bodyBase,metodo:'cartao'});
      if(d.cortesia){ location.href='/e/'+slug+'?pedido='+d.pedidoId+'&status=success'; return; }
    }
    const d=await api('POST','/api/public/checkout',bodyBase);
    if(d.invoiceUrl){ location.href=d.invoiceUrl; }
    else{ errEl.textContent='Não foi possível gerar o link de pagamento.'; errEl.style.display='block'; }
  }catch(e){
    errEl.textContent=e.message; errEl.style.display='block';
  }finally{
    PROCESSANDO_PAGAMENTO_ASAAS=false;
    btn.disabled=false; btn.textContent='Continuar para pagamento →';
  }
}

function montarCardFormSeNecessario(){
  if(CARD_FORM_MONTADO) return;
  // Limpa os campos antigos (iframes já montados) antes de recriar — evita conflito ao remontar
  // depois de um pagamento recusado, quando precisamos gerar um token novo.
  ['form-checkout__cardNumber','form-checkout__expirationDate','form-checkout__securityCode'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.innerHTML='';
  });
  if(!EVENTO?.mpPublicKey){
    const errEl=document.getElementById('errMsg');
    if(errEl){ errEl.textContent='Pagamento com cartão indisponível no momento (chave pública do Mercado Pago não configurada). Use o PIX ou avise o produtor.'; errEl.style.display='block'; }
    return;
  }
  if(typeof MercadoPago==='undefined'){ setTimeout(montarCardFormSeNecessario,300); return; }
  try{
    MP_INSTANCE=new MercadoPago(EVENTO.mpPublicKey,{locale:'pt-BR'});
    CARD_FORM=MP_INSTANCE.cardForm({
      amount: String(TOTAL_ATUAL||1),
      iframe: true,
      form: {
        id: 'form-checkout',
        cardNumber: { id:'form-checkout__cardNumber', placeholder:'Número do cartão', style:{color:'#18160F',fontSize:'15px','::placeholder':{color:'#8A8378'}} },
        expirationDate: { id:'form-checkout__expirationDate', placeholder:'MM/AA', style:{color:'#18160F',fontSize:'15px','::placeholder':{color:'#8A8378'}} },
        securityCode: { id:'form-checkout__securityCode', placeholder:'CVV', style:{color:'#18160F',fontSize:'15px','::placeholder':{color:'#8A8378'}} },
        cardholderName: { id:'form-checkout__cardholderName', placeholder:'Nome impresso no cartão' },
        issuer: { id:'form-checkout__issuer', placeholder:'Banco emissor' },
        installments: { id:'form-checkout__installments', placeholder:'Parcelas' },
        identificationType: { id:'form-checkout__identificationType', placeholder:'Tipo de documento' },
        identificationNumber: { id:'form-checkout__identificationNumber', placeholder:'CPF' },
      },
      callbacks: {
        // Só agora (quando o SDK confirma aqui) o formulário está realmente pronto pra uso —
        // marcar como "pronto" antes disso causava, em alguns casos raros, o clique em "Pagar"
        // acontecer numa janela de tempo em que nada ainda estava de fato conectado, resultando
        // em "dados do cartão incompletos" mesmo com tudo preenchido certinho.
        onFormMounted: error => {
          if(error){ console.warn('Erro ao montar formulário de cartão:', error); CARD_FORM_PRONTO=false; return; }
          CARD_FORM_PRONTO=true;
        },
        // IMPORTANTE: a tokenização do cartão (o "token" que mandamos pro servidor) só é gerada de
        // verdade DENTRO desse callback — é assim que o SDK do Mercado Pago funciona. Chamar
        // getCardFormData() fora daqui retorna dados incompletos, mesmo com o cartão certinho.
        onSubmit: event => {
          event.preventDefault();
          if(METODO_ATUAL==='cartao') processarSubmitCartao();
        },
      }
    });
    CARD_FORM_MONTADO=true;
    CARD_FORM_VALOR_MONTADO=TOTAL_ATUAL||1;
  }catch(e){ console.warn('Erro ao iniciar Mercado Pago SDK:', e); }
}

// O SDK do Mercado Pago calcula as opções de parcelamento (juros, valor de cada parcela) com base
// no "amount" passado na hora de montar o formulário — ele NÃO atualiza sozinho se o carrinho mudar
// depois (por exemplo, comprador aumenta de 1 pra 3 ingressos). Sem isso, o parcelamento mostrado
// ficava sempre baseado no valor de quando o formulário foi montado pela primeira vez.
// Em vez de remontar sozinho quando o valor muda (o que travava os campos caso a pessoa já
// estivesse digitando o cartão), só mostramos um aviso — a atualização de verdade só acontece
// se a própria pessoa clicar no botão, evitando qualquer surpresa no meio do preenchimento.
function avaliarAvisoValorDesatualizado(){
  const aviso=document.getElementById('avisoValorDesatualizado');
  if(!aviso) return;
  const desatualizado=CARD_FORM_MONTADO && Math.abs(TOTAL_ATUAL-CARD_FORM_VALOR_MONTADO)>=0.01;
  aviso.style.display=desatualizado?'block':'none';
}
function atualizarParcelamentoManualmente(){
  CARD_FORM_MONTADO=false;
  CARD_FORM_PRONTO=false;
  montarCardFormSeNecessario();
  document.getElementById('avisoValorDesatualizado').style.display='none';
}

// formulário ser criado no DOM — ver final dessa função.)

function coletarDadosComprador(){
  const nome=document.getElementById('cNome').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const cpf=document.getElementById('cCpf').value.trim().replace(/[^\d]/g,'');
  const tel=document.getElementById('cTel').value.trim();
  const itens=Object.entries(selecoes).filter(([_,q])=>q>0).map(([loteId,qtd])=>({loteId,qtd}));
  Object.entries(assentosSelecionados).forEach(([seatCode,info])=>{ itens.push({loteId:info.loteId,qtd:1,assento:seatCode}); });
  return {nome,email,cpf,tel,itens};
}
function validarDadosComprador(dados){
  const errEl=document.getElementById('errMsg');
  errEl.style.display='none';
  if(!dados.nome||!dados.email){errEl.textContent='Preencha nome e e-mail.';errEl.style.display='block';return false;}
  if(!dados.cpf||dados.cpf.length!==11){errEl.textContent='Digite um CPF válido (11 dígitos).';errEl.style.display='block';return false;}
  if(!dados.itens.length){errEl.textContent='Selecione ao menos um ingresso.';errEl.style.display='block';return false;}
  return true;
}
function montarBodyBase(dados){
  const bodyBase={slug,itens:dados.itens,comprador:{nome:dados.nome,email:dados.email,telefone:dados.tel},cpf:dados.cpf};
  if(cupomAplicado) bodyBase.cupom=cupomAplicado.codigo;
  if(refParam) bodyBase.ref=refParam;
  if(document.getElementById('usarCreditoCheck')?.checked) bodyBase.usarCredito=true;
  // Device ID: o SDK do Mercado Pago já captura isso sozinho quando carrega — enviar isso
  // junto do pagamento ajuda MUITO a reduzir recusas por segurança (cc_rejected_high_risk).
  if(window.MP_DEVICE_SESSION_ID) bodyBase.deviceId=window.MP_DEVICE_SESSION_ID;
  return bodyBase;
}

let PROCESSANDO_PAGAMENTO=false;

async function processarSubmitPix(){
  if(PROCESSANDO_PAGAMENTO) return;
  const dados=coletarDadosComprador();
  if(!validarDadosComprador(dados)) return;
  const errEl=document.getElementById('errMsg');
  PROCESSANDO_PAGAMENTO=true;
  const btn=document.getElementById('btnComprar');
  btn.disabled=true; btn.textContent='Processando...';
  const bodyBase=montarBodyBase(dados);
  try{
    if(TOTAL_ATUAL<=0){
      const d=await api('POST','/api/public/checkout',{...bodyBase,metodo:'cartao'});
      if(d.cortesia){ location.href='/e/'+slug+'?pedido='+d.pedidoId+'&status=success'; return; }
    }
    const d=await api('POST','/api/public/checkout',{...bodyBase,metodo:'pix'});
    exibirPix(d);
  }catch(e){
    errEl.textContent=e.message; errEl.style.display='block';
  }finally{
    PROCESSANDO_PAGAMENTO=false;
    btn.disabled=false; btn.textContent='Gerar PIX →';
  }
}

// Chamada de dentro do callback onSubmit do cardForm (ver montarCardFormSeNecessario) — só aí o
// token do cartão já foi gerado de verdade pelo SDK do Mercado Pago.
async function processarSubmitCartao(){
  if(PROCESSANDO_PAGAMENTO) return;
  const dados=coletarDadosComprador();
  if(!validarDadosComprador(dados)) return;
  const errEl=document.getElementById('errMsg');
  if(!CARD_FORM || !CARD_FORM_PRONTO){ errEl.textContent='Formulário de cartão ainda carregando, aguarde alguns segundos e tente novamente.'; errEl.style.display='block'; return; }

  PROCESSANDO_PAGAMENTO=true;
  const btn=document.getElementById('btnComprar');
  btn.disabled=true; btn.textContent='Processando...';
  const bodyBase=montarBodyBase(dados);

  try{
    if(TOTAL_ATUAL<=0){
      const d=await api('POST','/api/public/checkout',{...bodyBase,metodo:'cartao'});
      if(d.cortesia){ location.href='/e/'+slug+'?pedido='+d.pedidoId+'&status=success'; return; }
    }
    const dadosCartao=CARD_FORM.getCardFormData();
    if(!dadosCartao.token || !dadosCartao.paymentMethodId){
      errEl.textContent='Não conseguimos identificar o cartão. Confira o número, a validade e o CVV, e tente novamente.';
      errEl.style.display='block';
      return;
    }
    const body={...bodyBase, metodo:'cartao', token:dadosCartao.token, installments:dadosCartao.installments, paymentMethodId:dadosCartao.paymentMethodId, issuerId:dadosCartao.issuerId};
    const d=await api('POST','/api/public/checkout',body);
    if(d.status==='approved'){
      location.href='/e/'+slug+'?pedido='+d.pedidoId+'&status=success';
    }else if(d.status==='pending'){
      location.href='/e/'+slug+'?pedido='+d.pedidoId+'&status=pending';
    }else{
      errEl.textContent=d.motivo||'Pagamento não aprovado.'; errEl.style.display='block';
      // O token do cartão já foi usado (e recusado) — precisa gerar um novo token pra tentar de novo,
      // senão o Mercado Pago recusa com "Invalid card_token_id" na próxima tentativa.
      CARD_FORM_MONTADO=false;
      CARD_FORM_PRONTO=false;
      montarCardFormSeNecessario();
    }
  }catch(e){
    errEl.textContent=e.message; errEl.style.display='block';
  }finally{
    PROCESSANDO_PAGAMENTO=false;
    btn.disabled=false; btn.textContent='Pagar →';
  }
}

let pixPedidoId=null, pixPollTimer=null;
function exibirPix(d){
  pixPedidoId=d.pedidoId;
  document.getElementById('dadosCard').style.display='none';
  document.getElementById('pagamentoCard').style.display='none';
  document.getElementById('pixResultCard').style.display='block';
  document.getElementById('pixQrImg').src='data:image/png;base64,'+d.qrCodeBase64;
  document.getElementById('pixCopiaCola').value=d.qrCode||'';
  document.getElementById('pixResultCard').scrollIntoView({behavior:'smooth'});
  iniciarPollingPix();
}
function copiarPix(){
  const el=document.getElementById('pixCopiaCola');
  el.select(); el.setSelectionRange(0,99999);
  navigator.clipboard?.writeText(el.value).catch(()=>document.execCommand('copy'));
}
function iniciarPollingPix(){
  if(pixPollTimer) clearInterval(pixPollTimer);
  let tentativas=0;
  pixPollTimer=setInterval(async ()=>{
    tentativas++;
    try{
      const d=await api('GET','/api/public/pedido/'+pixPedidoId);
      if(d.status==='pago'){ clearInterval(pixPollTimer); location.href='/e/'+slug+'?pedido='+pixPedidoId+'&status=success'; }
      else if(d.status==='recusado'){ clearInterval(pixPollTimer); }
    }catch(e){}
    if(tentativas>60) clearInterval(pixPollTimer);
  },3000);
}

async function renderStatusPedido(){
  const badge={success:['ok','✅ Pagamento aprovado!'],pending:['pending','⏳ Pagamento em processamento'],failure:['fail','❌ Pagamento não aprovado']};
  const [cls,label]=badge[statusParam]||['pending','⏳ Verificando...'];
  document.getElementById('app').innerHTML=`<div class="card" style="text-align:center"><div class="badge ${cls}">${label}</div><div id="pedidoContent"><div class="spinner"></div></div></div>`;
  let tentativas=0;
  const poll=async()=>{
    try{
      const d=await api('GET','/api/public/pedido/'+pedidoParam);
      if(d.status==='pago' && d.tickets.length){
        document.getElementById('pedidoContent').innerHTML=`
          <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Seus ingressos, ${esc(d.comprador.nome)}:</p>
          ${d.tickets.map(t=>`<div class="ticket"><div class="ticket-qr" id="qr-${t.codigo}"></div><div><div class="ticket-code">${t.codigo}</div><div class="ticket-lote">${esc(t.loteNome)}</div></div></div>`).join('')}
          <a href="/api/public/pedido/${pedidoParam}/pdf" target="_blank" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:14px">📄 Abrir ingresso em PDF</a>
          <p style="font-size:11px;color:var(--text3);margin-top:10px">Guarde estes códigos. Apresente-os na entrada.</p>`;
        d.tickets.forEach(t=>gerarQR(t.codigo));
        // BUG corrigido: essa página (confirmação) nunca passava por injetarPixels() antes de tentar
        // disparar a conversão — o script do Meta/GA/TikTok nunca era carregado aqui, então o evento
        // de Compra nunca disparava de verdade, mesmo o ViewContent funcionando na página do evento.
        try{
          const ev=await api('GET','/api/public/eventos/'+slug);
          injetarPixels(ev.pixels);
          setTimeout(()=>dispararConversao(ev.pixels,d.total,pedidoParam), 400);
        }catch(e){}
        return;
      }
      if(d.status==='recusado'){ document.getElementById('pedidoContent').innerHTML='<p style="font-size:13px;color:var(--text2)">Pagamento não aprovado. Tente novamente.</p>'; return; }
      tentativas++;
      if(tentativas<10) setTimeout(poll,3000);
      else document.getElementById('pedidoContent').innerHTML='<p style="font-size:13px;color:var(--text2)">Ainda processando. Atualize a página em instantes.</p>';
    }catch(e){ document.getElementById('pedidoContent').innerHTML='<p style="font-size:13px;color:var(--text2)">'+esc(e.message)+'</p>'; }
  };
  poll();
}
function gerarQR(texto){
  const el=document.getElementById('qr-'+texto);
  if(!el) return;
  const img=document.createElement('img');
  img.src='https://api.qrserver.com/v1/create-qr-code/?size=140x140&data='+encodeURIComponent(texto);
  img.style.width='100%'; img.style.height='100%'; img.style.borderRadius='8px';
  el.appendChild(img);
}

init();
